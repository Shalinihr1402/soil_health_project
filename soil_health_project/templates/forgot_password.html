<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | AI Soil Health System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --leaf-green: #2D5A27; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
    .login-card { border-radius: 15px; }
    .logo-icon { font-size: 3rem; color: var(--leaf-green); }
    .form-control:focus { border-color: var(--leaf-green); box-shadow: 0 0 0 0.2rem rgba(45, 90, 39, 0.25); }
    .btn-login { background-color: var(--leaf-green); border-color: var(--leaf-green); }
    .btn-login:hover { background-color: #234723; border-color: #234723; }
  </style>
</head>
<body class="d-flex align-items-center">
  <main class="container py-5">
    <section class="card shadow-lg border-0 login-card mx-auto" style="max-width: 460px;">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-3">
          <i class="bi bi-key logo-icon"></i>
          <h1 class="h3 mb-1">Reset Your Password</h1>
          <p class="text-muted small mb-0">Enter your account email to receive a reset link.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show d-flex align-items-center" role="alert">
                <div>{{ message }}</div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">
              <i class="bi bi-envelope me-1"></i>Email Address
            </label>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control"
              placeholder="Enter your account email"
              required
              autofocus
            >
          </div>

          <button class="btn btn-login btn-lg text-white w-100 mb-3" type="submit">
            <i class="bi bi-send me-2"></i>Send Reset Link
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('login') }}" class="text-muted small text-decoration-none">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
